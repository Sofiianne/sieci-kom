        html {
    scroll-behavior: smooth;
}

hr {
  display: block;
  border: none;
  opacity: 1;

  height: 2px;
  width: 100%;

  background: linear-gradient(
    to right,
    transparent,
     #029196,
    #00f7ff,
    #9ce4cb,

     #029196,
    transparent
  );
}
        .title {

        .title-little {

}
.transform {
    display: inline-block;
    background: #19aaaa;
    color: white;
    padding: 15px;
    border-radius: 8px;
    transition: transform 0.3s;
}
.transform:hover {
    transform: rotate(6deg) scale(1.1);
    box-shadow: #071e20;
    animation: tecza 1s infinite;
  }


/* Definicja animacji (przechodzenie przez różne kolory) */
@keyframes tecza {
    0% { background-color: #6efcfc; }   /* Czerwony */
    20% { background-color: #1de9e9; }  /* Pomarańczowy */

}
.card {
     transition: transform 0.3s ease, box-shadow 0.3s ease;

}
  .card:hover {
  transform: translateY(-10px);
  background: #0e3033;
  }
